<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym +40</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 5px; font-weight: bold; }
        .ejercicio { background: white; padding: 15px; border-radius: 10px; margin-top: 10px; border-left: 5px solid #007bff; position: relative; }
        .btn-del { position: absolute; right: 10px; top: 10px; color: red; background: none; border: none; width: auto; }
    </style>
</head>
<body>

    <div class="card">
        <h3>Nuevo Ejercicio</h3>
        <input type="text" id="n" placeholder="Nombre">
        <input type="text" id="r" placeholder="Reps">
        <input type="text" id="p" placeholder="Peso">
        <button onclick="guardar()">AÑADIR</button>
    </div>

    <div id="lista"></div>

    <script>
        // Cargar datos al abrir
        let datos = JSON.parse(localStorage.getItem('gym_v3')) || [];
        
        function mostrar() {
            const contenedor = document.getElementById('lista');
            contenedor.innerHTML = '';
            datos.forEach((e, i) => {
                contenedor.innerHTML += `
                    <div class="ejercicio">
                        <strong>${e.nombre}</strong><br>
                        ${e.reps} - ${e.peso}
                        <button class="btn-del" onclick="borrar(${i})">X</button>
                    </div>`;
            });
        }

        function guardar() {
            const n = document.getElementById('n').value;
            const r = document.getElementById('r').value;
            const p = document.getElementById('p').value;

            if(n === "") { alert("Pon un nombre"); return; }

            datos.push({ nombre: n, reps: r, peso: p });
            localStorage.setItem('gym_v3', JSON.stringify(datos));
            
            // Limpiar campos
            document.getElementById('n').value = '';
            document.getElementById('r').value = '';
            document.getElementById('p').value = '';
            
            mostrar();
            alert("¡Guardado con éxito!");
        }

        function borrar(i) {
            if(confirm("¿Borrar?")) {
                datos.splice(i, 1);
                localStorage.setItem('gym_v3', JSON.stringify(datos));
                mostrar();
            }
        }

        mostrar();
    </script>
</body>
</html>
