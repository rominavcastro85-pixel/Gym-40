<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Gym 40</title>
    <style>
        body { font-family: sans-serif; padding: 15px; background: #f0f2f5; margin: 0; }
        .caja { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 14px; background: #007bff; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; margin-top: 10px; }
        .ej { background: white; border-radius: 12px; margin-top: 15px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: relative; }
        .ej img { width: 100%; height: auto; max-height: 250px; object-fit: cover; display: block; }
        .info { padding: 12px; }
        .borrar { position: absolute; right: 10px; top: 10px; color: white; background: rgba(255,0,0,0.7); border-radius: 50%; border: none; width: 30px; height: 30px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="caja">
        <h3>🏋️ Guardar Ejercicio</h3>
        <input type="text" id="n" placeholder="Nombre">
        <input type="text" id="d" placeholder="Reps / Peso">
        
        <label style="font-size: 13px; color: #666;">Selecciona imagen:</label>
        <input type="file" id="f" accept="image/*">
        
        <button onclick="guardar()">AÑADIR A LA LISTA</button>
    </div>

    <div id="lista"></div>

    <script>
        let clave = "gym_vFinal_super_compatible";
        let datos = JSON.parse(localStorage.getItem(clave)) || [];

        function mostrar() {
            const cont = document.getElementById('lista');
            cont.innerHTML = '';
            datos.forEach((e, i) => {
                cont.innerHTML += `
                    <div class="ej">
                        ${e.img ? `<img src="${e.img}">` : ''}
                        <div class="info">
                            <strong>${e.n}</strong><br><span>${e.d}</span>
                        </div>
                        <button class="borrar" onclick="eliminar(${i})">X</button>
                    </div>`;
            });
        }

        function guardar() {
            const n = document.getElementById('n').value;
            const d = document.getElementById('d').value;
            const archivo = document.getElementById('f').files[0];

            if(!n) return alert("Escribe el nombre");

            if (archivo) {
                const lector = new FileReader();
                lector.onloadend = function() {
                    // Guardamos directo sin procesar para evitar errores
                    datos.push({ n: n, d: d, img: lector.result });
                    finalizar();
                };
                lector.readAsDataURL(archivo);
            } else {
                datos.push({ n: n, d: d, img: "" });
                finalizar();
            }
        }

        function finalizar() {
            try {
                localStorage.setItem(clave, JSON.stringify(datos));
                document.getElementById('n').value = '';
                document.getElementById('d').value = '';
                document.getElementById('f').value = '';
                mostrar();
                alert("¡Guardado!");
            } catch(e) {
                alert("La foto es muy grande para la memoria del móvil. Prueba con una foto de menos calidad.");
                datos.pop();
            }
        }

        function eliminar(i) {
            if(confirm("¿Borrar?")) {
                datos.splice(i, 1);
                localStorage.setItem(clave, JSON.stringify(datos));
                mostrar();
            }
        }

        mostrar();
    </script>
</body>
</html>
