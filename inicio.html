[10:18 p.m., 12/3/2026] Ro: <!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Lista</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f0f0; }
        .caja { background: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 5px; font-weight: bold; }
        .ejercicio { background: white; padding: 15px; border-radius: 10px; margin-top: 10px; border-left: 5px solid #007bff; }
    </style>
</head>
<body>

    <div class="caja">
        <h3>Nueva Rutina</h3>
        <input type="text" id="nombre" placeholder="Ejercicio">
        <input type="text" id="datos" placeholder="Reps / Peso">
        <button onclick="salvar()">AÑADIR</button>
    </div>

    <div id="lista"></div>

    <script>
        // Cambiamos el nombre de la memoria para que esté vacía
        let clave = "gym_limpio_v1";

        function ver() {
            const cont = document.getElementById('lista');
            cont.innerHTML = '';
            let items = JSON.parse(localStorage.getItem(clave)) || [];
            items.forEach((e, i) => {
                cont.innerHTML += `<div class="ejercicio">
                    <strong>${e.n}</strong><br>${e.d}
                </div>`;
            });
        }

        function salvar() {
            const n = document.getElementById('nombre').value;
            const d = document.getElementById('datos').value;
            if(!n) return alert("Escribe algo");

            let items = JSON.parse(localStorage.getItem(clave)) || [];
            items.push({ n: n, d: d });
            
            try {
                localStorage.setItem(clave, JSON.stringify(items));
                document.getElementById('nombre').value = '';
                document.getElementById('datos').value = '';
                ver();
                alert("¡Guardado!");
            } catch(e) {
                alert("Error de memoria. Limpia los datos de tu navegador.");
            }
        }

        ver();
    </script>
</body>
</html>
