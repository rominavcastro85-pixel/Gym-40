<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Gym Pro</title>
    <style>
        body { font-family: sans-serif; padding: 15px; background: #f0f2f5; margin: 0; padding-bottom: 50px; }
        .caja { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn-guardar { width: 100%; padding: 14px; background: #007bff; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; margin-top: 10px; }
        .ej { background: white; border-radius: 12px; margin-top: 15px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: relative; }
        .ej img { width: 100%; height: auto; max-height: 250px; object-fit: cover; display: block; }
        .info { padding: 12px; }
        .acciones { display: flex; gap: 10px; padding: 0 12px 12px; }
        .btn-edit { background: #ffc107; border: none; padding: 8px; border-radius: 5px; flex: 1; font-weight: bold; }
        .btn-del { background: #ff4444; color: white; border: none; padding: 8px; border-radius: 5px; flex: 1; font-weight: bold; }
    </style>
</head>
<body>

    <div class="caja" id="formulario">
        <h3 id="titulo-form">🏋️ Guardar Ejercicio</h3>
        <input type="hidden" id="indice-edit">
        <input type="text" id="n" placeholder="Nombre (ej: Sentadilla)">
        <input type="text" id="d" placeholder="Reps / Peso">
        <label id="label-foto" style="font-size: 13px; color: #666;">Selecciona imagen:</label>
        <input type="file" id="f" accept="image/*">
        <button class="btn-guardar" id="btn-principal" onclick="guardar()">AÑADIR A LA LISTA</button>
        <button class="btn-guardar" id="btn-cancelar" style="display:none; background:#6c757d;" onclick="cancelarEdicion()">CANCELAR</button>
    </div>

    <div id="lista"></div>

    <script>
        let clave = "gym_vFinal_super_compatible";
        let datos = JSON.parse(localStorage.getItem(clave)) || [];
        let editando = false;

        function mostrar() {
            const cont = document.getElementById('lista');
            cont.innerHTML = '';
            datos.forEach((e, i) => {
                cont.innerHTML += `
                    <div class="ej">
                        ${e.img ? `<img src="${e.img}">` : ''}
                        <div class="info">
                            <strong>${e.n}</strong><br><span>${e.d}</span>
                        </div>
                        <div class="acciones">
                            <button class="btn-edit" onclick="prepararEdicion(${i})">EDITAR</button>
                            <button class="btn-del" onclick="eliminar(${i})">BORRAR</button>
                        </div>
                    </div>`;
            });
        }

        function guardar() {
            const n = document.getElementById('n').value;
            const d = document.getElementById('d').value;
            const archivo = document.getElementById('f').files[0];
            const indice = document.getElementById('indice-edit').value;

            if(!n) return alert("Escribe el nombre");

            if (archivo) {
                const lector = new FileReader();
                lector.onloadend = function() {
                    procesarGuardado(n, d, lector.result, indice);
                };
                lector.readAsDataURL(archivo);
            } else {
                // Si estamos editando y no subimos foto nueva, mantenemos la anterior
                const fotoAnterior = editando ? datos[indice].img : "";
                procesarGuardado(n, d, fotoAnterior, indice);
            }
        }

        function procesarGuardado(nombre, detalle, imagen, indice) {
            if (editando) {
                datos[indice] = { n: nombre, d: detalle, img: imagen };
                editando = false;
            } else {
                datos.push({ n: nombre, d: detalle, img: imagen });
            }
            finalizar();
        }

        function finalizar() {
            try {
                localStorage.setItem(clave, JSON.stringify(datos));
                cancelarEdicion();
                mostrar();
                alert("¡Hecho!");
            } catch(e) {
                alert("Foto muy pesada.");
            }
        }

        function prepararEdicion(i) {
            editando = true;
            document.getElementById('n').value = datos[i].n;
            document.getElementById('d').value = datos[i].d;
            document.getElementById('indice-edit').value = i;
            
            document.getElementById('titulo-form').innerText = "📝 Editando Ejercicio";
            document.getElementById('btn-principal').innerText = "ACTUALIZAR DATOS";
            document.getElementById('btn-cancelar').style.display = "block";
            window.scrollTo(0,0);
        }

        function cancelarEdicion() {
            editando = false;
            document.getElementById('n').value = '';
            document.getElementById('d').value = '';
            document.getElementById('f').value = '';
            document.getElementById('titulo-form').innerText = "🏋️ Guardar Ejercicio";
            document.getElementById('btn-principal').innerText = "AÑADIR A LA LISTA";
            document.getElementById('btn-cancelar').style.display = "none";
        }

        function eliminar(i) {
            if(confirm("¿Borrar ejercicio?")) {
                datos.splice(i, 1);
                localStorage.setItem(clave, JSON.stringify(datos));
                mostrar();
            }
        }

        mostrar();
    </script>
</body>
</html>
