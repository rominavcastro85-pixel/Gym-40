<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gym Pro +40</title>
    <style>
        :root { --primary: #2563eb; --bg: #f0f2f5; --card: #ffffff; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 15px; padding-bottom: 30px; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h3 { margin-top: 0; color: #1e293b; text-align: center; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn-main { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; }
        .ejercicio { background: white; border-radius: 12px; margin-top: 15px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: relative; }
        .ejercicio img { width: 100%; height: 200px; object-fit: cover; display: block; background: #eee; }
        .info { padding: 12px; }
        .btn-del { position: absolute; right: 10px; bottom: 10px; color: #ff4444; background: none; border: none; font-size: 14px; font-weight: bold; }
        label { font-size: 14px; color: #64748b; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h3>💪 Mi Rutina</h3>
        <input type="text" id="n" placeholder="Nombre del ejercicio">
        <input type="text" id="r" placeholder="Repeticiones (ej: 4x12)">
        <input type="text" id="p" placeholder="Peso (ej: 15kg)">
        <label>Foto del ejercicio:</label>
        <input type="file" id="f" accept="image/*" capture="environment">
        <button class="btn-main" onclick="procesar()">GUARDAR EJERCICIO</button>
    </div>

    <div id="lista"></div>

    <script>
        let datos = JSON.parse(localStorage.getItem('gym_v4')) || [];

        function mostrar() {
            const contenedor = document.getElementById('lista');
            contenedor.innerHTML = '';
            datos.forEach((e, i) => {
                contenedor.innerHTML += `
                    <div class="ejercicio">
                        ${e.img ? <img src="${e.img}"> : ''}
                        <div class="info">
                            <strong>${e.nombre}</strong><br>
                            <small>${e.reps} — ${e.peso}</small>
                            <button class="btn-del" onclick="borrar(${i})">ELIMINAR</button>
                        </div>
                    </div>`;
            });
        }
