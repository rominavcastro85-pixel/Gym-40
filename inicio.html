<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Gym</title>
    <style>
        body { font-family: sans-serif; padding: 15px; background: #f0f2f5; }
        .caja { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: #007bff; color: white; border: none; border-radius: 8px; font-weight: bold; }
        .ej { background: white; border-radius: 12px; margin-top: 15px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .ej img { width: 100%; height: 180px; object-fit: cover; display: block; }
        .info { padding: 12px; }
        .borrar { color: red; background: none; border: none; float: right; }
    </style>
</head>
<body>

    <div class="caja">
        <h3>💪 Nuevo Ejercicio</h3>
        <input type="text" id="n" placeholder="Nombre">
        <input type="text" id="d" placeholder="Reps / Peso">
        <label style="font-size:12px; color:666;">Seleccionar Foto o Cámara:</label>
        <input type="file" id="f" accept="image/*"> 
        <button onclick="guardar()">AÑADIR A LA LISTA</button>
    </div>

    <div id="lista"></div>

    <script>
        let db = JSON.parse(localStorage.getItem('gym_v5')) || [];

        function mostrar() {
            const div = document.getElementById('lista');
            div.innerHTML = '';
            db.forEach((e, i) => {
                div.innerHTML += `
                    <div class="ej">
                        ${e.img ? <img src="${e.img}"> : ''}
                        <div class="info">
                            <button class="borrar" onclick="eliminar(${i})">X</button>
                            <strong>${e.n}</strong><br><small>${e.d}</small>
                        </div>
                    </div>`;
            });
        }

        async function guardar() {
            const n = document.getElementById('n').value;
            const d = document.getElementById('d').value;
            const file = document.getElementById('f').files[0];

            if(!n) return alert("Falta el nombre");

            let imgB64 = "";
            if(file) {
                // Versión de carga directa más simple
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => {
                    db.push({ n, d, img: reader.result });
                    localStorage.setItem('gym_v5', JSON.stringify(db));
                    limpiar();
                };
            } else {
                db.push({ n, d, img: "" });
                localStorage.setItem('gym_v5', JSON.stringify(db));
                limpiar();
            }
        }

        function limpiar() {
            document.getElementById('n').value = '';
            document.getElementById('d').value = '';
            document.getElementById('f').value = '';
            mostrar();
            alert("¡Ejercicio guardado!");
        }

        function eliminar(i) {
            if(confirm("¿Borrar?")) {
                db.splice(i, 1);
                localStorage.setItem('gym_v5', JSON.stringify(db));
                mostrar();
            }
        }

        mostrar();
    </script>
</body>
</html>
