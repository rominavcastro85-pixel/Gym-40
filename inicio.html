<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Gym</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #eee; }
        .caja { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; border-radius: 5px; font-weight: bold; margin-top: 10px; }
        .ej { background: white; padding: 10px; margin-top: 10px; border-radius: 5px; border-left: 5px solid #28a745; position: relative; }
        .borrar { position: absolute; right: 10px; top: 10px; color: red; cursor: pointer; border: none; background: none; }
    </style>
</head>
<body>

    <div class="caja">
        <h3>Añadir Ejercicio</h3>
        <input type="text" id="nombre" placeholder="Nombre">
        <input type="text" id="detalles" placeholder="Reps / Peso">
        <button onclick="guardar()">GUARDAR</button>
    </div>

    <div id="lista"></div>

    <script>
        // Función para cargar lo guardado
        function cargar() {
            const lista = document.getElementById('lista');
            lista.innerHTML = '';
            const datos = JSON.parse(localStorage.getItem('gym_vFinal')) || [];
            datos.forEach((e, i) => {
                lista.innerHTML += `<div class="ej">
                    <b>${e.n}</b><br>${e.d}
                    <button class="borrar" onclick="eliminar(${i})">X</button>
                </div>`;
            });
        }

        // Función para guardar
        function guardar() {
            const n = document.getElementById('nombre').value;
            const d = document.getElementById('detalles').value;
            if(!n) return alert("Pon el nombre");

            const datos = JSON.parse(localStorage.getItem('gym_vFinal')) || [];
            datos.push({ n: n, d: d });
            localStorage.setItem('gym_vFinal', JSON.stringify(datos));
            
            document.getElementById('nombre').value = '';
            document.getElementById('detalles').value = '';
            cargar();
            alert("¡Guardado!");
        }

        // Función para borrar
        function eliminar(i) {
            const datos = JSON.parse(localStorage.getItem('gym_vFinal')) || [];
            datos.splice(i, 1);
            localStorage.setItem('gym_vFinal', JSON.stringify(datos));
            cargar();
        }

        cargar();
    </script>
</body>
</html>
